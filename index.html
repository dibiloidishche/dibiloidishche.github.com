<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Планер">
    <meta name="theme-color" content="#D9ADD1">
    <title>Календарь-планер</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --bg: #D9ADD1;
            --text: #2d2d2d;
            --text-light: #5a5a5a;
            --card-bg: rgba(255, 255, 255, 0.88);
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            --radius: 16px;
            --font: 'Montserrat', sans-serif;
            --safe-top: env(safe-area-inset-top, 0px);
            --safe-bottom: env(safe-area-inset-bottom, 0px);
            --safe-left: env(safe-area-inset-left, 0px);
            --safe-right: env(safe-area-inset-right, 0px);
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            touch-action: manipulation;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(255, 182, 193, 0.25) 0%, transparent 30%),
                radial-gradient(circle at 90% 80%, rgba(255, 182, 193, 0.20) 0%, transparent 35%),
                radial-gradient(circle at 30% 70%, rgba(255, 182, 193, 0.18) 0%, transparent 25%),
                radial-gradient(circle at 70% 30%, rgba(255, 182, 193, 0.15) 0%, transparent 30%),
                repeating-conic-gradient(from 0deg, transparent 0deg, rgba(255, 182, 193, 0.05) 5deg, transparent 10deg),
                repeating-conic-gradient(from 45deg, transparent 0deg, rgba(255, 182, 193, 0.04) 8deg, transparent 15deg);
            pointer-events: none;
            z-index: 0;
        }

        .rose-bg {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            opacity: 0.35;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .rose-bg svg {
            width: 100%;
            height: 100%;
            position: absolute;
        }

        #app {
            position: relative;
            z-index: 1;
            width: 100%;
            height: 100vh;
            height: 100dvh;
            display: none;
            flex-direction: column;
            padding: 12px;
            padding-top: calc(12px + var(--safe-top));
            padding-bottom: calc(12px + var(--safe-bottom));
            padding-left: calc(12px + var(--safe-left));
            padding-right: calc(12px + var(--safe-right));
            overflow: hidden;
        }

        #app.show {
            display: flex;
        }

        .welcome-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(217, 173, 209, 0.92);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            padding: 20px;
            animation: fadeIn 0.5s ease;
        }

        .welcome-content {
            text-align: center;
            max-width: 340px;
            width: 100%;
        }

        .welcome-content .welcome-icon {
            font-size: 64px;
            margin-bottom: 16px;
        }

        .welcome-content h1 {
            font-family: var(--font);
            font-size: 32px;
            font-weight: 800;
            color: #fff;
            margin-bottom: 8px;
        }

        .welcome-content p {
            font-family: var(--font);
            font-size: 16px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 24px;
            line-height: 1.5;
        }

        .welcome-content .welcome-btn {
            padding: 14px 40px;
            border: none;
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            color: #fff;
            font-family: var(--font);
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            touch-action: manipulation;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .welcome-content .welcome-btn:active {
            transform: scale(0.95);
            background: rgba(255, 255, 255, 0.5);
        }

        .auth-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(217, 173, 209, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 3000;
            padding: 20px;
            animation: fadeIn 0.5s ease;
        }

        .auth-overlay.show {
            display: flex;
        }

        .auth-content {
            background: white;
            border-radius: 20px;
            padding: 30px;
            max-width: 380px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
            animation: slideUp 0.3s ease;
        }

        .auth-content .auth-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        .auth-content h2 {
            font-family: var(--font);
            font-size: 24px;
            font-weight: 800;
            color: var(--text);
            margin-bottom: 8px;
        }

        .auth-content p {
            font-family: var(--font);
            font-size: 14px;
            font-weight: 500;
            color: var(--text-light);
            margin-bottom: 20px;
            line-height: 1.4;
        }

        .auth-content input {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid rgba(0, 0, 0, 0.08);
            border-radius: 10px;
            font-family: var(--font);
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 10px;
            background: rgba(0, 0, 0, 0.02);
            color: var(--text);
            transition: all 0.2s;
        }

        .auth-content input:focus {
            outline: none;
            border-color: #D9ADD1;
            background: rgba(217, 173, 209, 0.05);
        }

        .auth-content .auth-btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            background: #D9ADD1;
            color: white;
            font-family: var(--font);
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            touch-action: manipulation;
            margin-bottom: 8px;
        }

        .auth-content .auth-btn:active {
            transform: scale(0.95);
        }

        .auth-content .auth-btn.secondary {
            background: transparent;
            border: 1.5px solid #D9ADD1;
            color: #D9ADD1;
            margin-bottom: 0;
        }

        .auth-content .auth-btn.secondary:active {
            background: rgba(217, 173, 209, 0.05);
        }

        .auth-content .auth-error {
            color: #e74c3c;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 10px;
            min-height: 20px;
            font-family: var(--font);
        }

        .auth-content .auth-success {
            color: #27ae60;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 10px;
            min-height: 20px;
            font-family: var(--font);
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 4px 12px;
            flex-shrink: 0;
            gap: 8px;
            flex-wrap: wrap;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: 2px;
            color: #fff;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            font-family: var(--font);
        }

        .header-controls {
            display: flex;
            gap: 6px;
            align-items: center;
        }

        .header-btn {
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            padding: 8px 14px;
            font-family: var(--font);
            font-size: 14px;
            font-weight: 700;
            color: #fff;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
            touch-action: manipulation;
        }

        .header-btn:active {
            transform: scale(0.95);
            background: rgba(255, 255, 255, 0.5);
        }

        .header-btn.active {
            background: rgba(255, 255, 255, 0.5);
            border-color: rgba(255, 255, 255, 0.6);
        }

        .user-selector {
            display: flex;
            gap: 8px;
            padding: 4px 0 12px;
            flex-shrink: 0;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
            flex-wrap: wrap;
            align-items: center;
        }

        .user-selector::-webkit-scrollbar {
            display: none;
        }

        .user-btn {
            padding: 8px 18px;
            border-radius: 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            font-family: var(--font);
            font-size: 16px;
            font-weight: 700;
            color: #fff;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
            touch-action: manipulation;
            flex-shrink: 0;
        }

        .user-btn:active {
            transform: scale(0.95);
        }

        .user-btn.active {
            border-color: #fff;
            background: rgba(255, 255, 255, 0.3);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
        }

        .user-btn .color-dot {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 6px;
            vertical-align: middle;
        }

        .logout-btn {
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 8px;
            transition: all 0.2s;
            font-family: var(--font);
            font-weight: 600;
            margin-left: 4px;
        }

        .logout-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            color: #fff;
        }

        .logout-btn:active {
            transform: scale(0.95);
        }

        .date-nav {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 4px 0 12px;
            flex-shrink: 0;
            justify-content: center;
        }

        .date-nav-btn {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.25);
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            color: #fff;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            touch-action: manipulation;
            flex-shrink: 0;
        }

        .date-nav-btn:active {
            transform: scale(0.92);
            background: rgba(255, 255, 255, 0.3);
        }

        .date-display {
            font-family: var(--font);
            font-size: 20px;
            font-weight: 600;
            color: #fff;
            min-width: 120px;
            text-align: center;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            flex: 1;
        }

        .today-btn {
            padding: 6px 16px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.25);
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            color: #fff;
            font-family: var(--font);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            touch-action: manipulation;
            flex-shrink: 0;
        }

        .today-btn:active {
            transform: scale(0.95);
            background: rgba(255, 255, 255, 0.3);
        }

        .content {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
            padding-bottom: 8px;
            margin: 0 -4px;
            padding-left: 4px;
            padding-right: 4px;
            scroll-behavior: smooth;
        }

        .content::-webkit-scrollbar {
            width: 3px;
        }

        .content::-webkit-scrollbar-track {
            background: transparent;
        }

        .content::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.3);
            border-radius: 10px;
        }

        .day-view {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .day-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: var(--radius);
            padding: 16px;
            box-shadow: var(--shadow);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .day-card-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
        }

        .day-card-header .color-bar {
            width: 4px;
            height: 28px;
            border-radius: 4px;
            flex-shrink: 0;
        }

        .day-card-header .user-name {
            font-size: 18px;
            font-weight: 700;
            color: var(--text);
            font-family: var(--font);
        }

        .day-card-header .badge {
            margin-left: auto;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-light);
            background: rgba(0, 0, 0, 0.04);
            padding: 2px 10px;
            border-radius: 12px;
            font-family: var(--font);
        }

        .tasks {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .task-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 10px;
            transition: all 0.2s;
            border: 1px solid rgba(0, 0, 0, 0.04);
        }

        .task-item .task-time {
            font-size: 12px;
            color: var(--text-light);
            font-weight: 700;
            min-width: 48px;
            font-family: var(--font);
            display: flex;
            flex-direction: column;
            line-height: 1.2;
        }

        .task-item .task-text {
            flex: 1;
            font-size: 15px;
            font-weight: 600;
            color: var(--text);
            word-break: break-word;
            font-family: var(--font);
        }

        .task-item .task-actions {
            display: flex;
            gap: 4px;
            flex-shrink: 0;
        }

        .task-item .task-btn {
            width: 30px;
            height: 30px;
            border-radius: 8px;
            border: none;
            background: rgba(0, 0, 0, 0.04);
            color: var(--text-light);
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            touch-action: manipulation;
        }

        .task-item .task-btn:active {
            transform: scale(0.9);
            background: rgba(0, 0, 0, 0.08);
        }

        .task-item .task-btn.delete:hover {
            color: #e74c3c;
        }

        .task-empty {
            text-align: center;
            color: var(--text-light);
            padding: 20px 0;
            font-size: 16px;
            font-weight: 500;
            opacity: 0.7;
            font-family: var(--font);
        }

        .task-item.other-user {
            opacity: 0.85;
        }

        .task-item.other-user .task-actions {
            display: none;
        }

        .add-task-form {
            display: flex;
            gap: 8px;
            margin-top: 10px;
            flex-wrap: wrap;
        }

        .add-task-form .time-group {
            display: flex;
            gap: 4px;
            align-items: center;
            flex-shrink: 0;
        }

        .add-task-form .time-group span {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-light);
        }

        .add-task-form input[type="time"] {
            padding: 10px 8px;
            border: 1px solid rgba(0, 0, 0, 0.08);
            border-radius: 10px;
            font-family: var(--font);
            font-size: 13px;
            font-weight: 500;
            background: rgba(255, 255, 255, 0.6);
            color: var(--text);
            width: 70px;
            flex-shrink: 0;
            -webkit-appearance: none;
            appearance: none;
        }

        .add-task-form input[type="text"] {
            flex: 1;
            padding: 10px 12px;
            border: 1px solid rgba(0, 0, 0, 0.08);
            border-radius: 10px;
            font-family: var(--font);
            font-size: 14px;
            font-weight: 500;
            background: rgba(255, 255, 255, 0.6);
            color: var(--text);
            min-width: 80px;
        }

        .add-task-form input:focus {
            outline: none;
            border-color: rgba(255, 255, 255, 0.4);
            background: rgba(255, 255, 255, 0.8);
        }

        .add-task-form .add-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.4);
            color: #fff;
            font-family: var(--font);
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            touch-action: manipulation;
            flex-shrink: 0;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }

        .add-task-form .add-btn:active {
            transform: scale(0.95);
            background: rgba(255, 255, 255, 0.6);
        }

        .week-compact {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .week-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: var(--radius);
            padding: 16px;
            box-shadow: var(--shadow);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .week-card .week-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid rgba(0, 0, 0, 0.06);
        }

        .week-card .week-header .color-bar {
            width: 4px;
            height: 28px;
            border-radius: 4px;
            flex-shrink: 0;
        }

        .week-card .week-header .user-name {
            font-size: 18px;
            font-weight: 700;
            color: var(--text);
            font-family: var(--font);
        }

        .week-card .week-header .badge {
            margin-left: auto;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-light);
            background: rgba(0, 0, 0, 0.04);
            padding: 2px 10px;
            border-radius: 12px;
            font-family: var(--font);
        }

        .week-day-row {
            display: flex;
            align-items: stretch;
            border-bottom: 1px solid rgba(0, 0, 0, 0.04);
            padding: 4px 0;
            min-height: 32px;
        }

        .week-day-row:last-child {
            border-bottom: none;
        }

        .week-day-row .day-label {
            min-width: 48px;
            font-size: 13px;
            font-weight: 700;
            color: var(--text-light);
            display: flex;
            align-items: center;
            flex-shrink: 0;
            padding-right: 8px;
        }

        .week-day-row .day-label.today {
            color: #e74c3c;
        }

        .week-day-row .day-tasks {
            flex: 1;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 4px 8px;
            padding: 2px 0;
        }

        .week-day-row .day-tasks .wtask {
            font-size: 12px;
            font-weight: 600;
            color: var(--text);
            background: rgba(255, 255, 255, 0.4);
            padding: 2px 10px;
            border-radius: 6px;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            white-space: nowrap;
            max-width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .week-day-row .day-tasks .wtask .wtask-time {
            font-size: 10px;
            font-weight: 700;
            color: var(--text-light);
        }

        .week-day-row .day-tasks .wtask .wtask-delete {
            background: none;
            border: none;
            color: #e74c3c;
            font-size: 11px;
            cursor: pointer;
            padding: 0 2px;
            font-weight: 700;
            touch-action: manipulation;
        }

        .week-day-row .day-tasks .wtask .wtask-delete:active {
            transform: scale(0.8);
        }

        .week-day-row .day-tasks .week-empty-text {
            font-size: 13px;
            font-weight: 500;
            color: var(--text-light);
            opacity: 0.5;
        }

        .week-add-form {
            display: flex;
            gap: 6px;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid rgba(0, 0, 0, 0.06);
            flex-wrap: wrap;
            align-items: center;
        }

        .week-add-form .wa-day-select {
            padding: 6px 8px;
            border: 1px solid rgba(0, 0, 0, 0.08);
            border-radius: 8px;
            font-family: var(--font);
            font-size: 12px;
            font-weight: 600;
            background: rgba(255, 255, 255, 0.6);
            color: var(--text);
            min-width: 60px;
        }

        .week-add-form .time-group {
            display: flex;
            gap: 3px;
            align-items: center;
        }

        .week-add-form .time-group span {
            font-size: 10px;
            font-weight: 600;
            color: var(--text-light);
        }

        .week-add-form input[type="time"] {
            padding: 6px 6px;
            border: 1px solid rgba(0, 0, 0, 0.08);
            border-radius: 8px;
            font-family: var(--font);
            font-size: 12px;
            font-weight: 500;
            background: rgba(255, 255, 255, 0.6);
            color: var(--text);
            width: 60px;
            flex-shrink: 0;

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // === КОНФИГУРАЦИЯ SUPABASE ===
        const SUPABASE_URL = 'https://hrwoenkrfducxuduuvfr.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_zwmmH6vHObejL0S_z7MdSg_Vq303EH4';

        // === СОСТОЯНИЕ ===
        let state = {
            view: 'day',
            currentDate: new Date(),
            tasks: [],
            users: [], // Заполняется из базы данных
            selectedUser: null, // Текущий выбранный пользователь
            currentUser: null,
            isAuthenticated: false
        };

        let deleteTarget = null;
        let syncTimeout = null;
        let supabaseChannel = null;
        let supabase = null;

        // === DOM ===
        const $ = id => document.getElementById(id);
        const userSelector = $('userSelector');
        const dateDisplay = $('dateDisplay');
        const content = $('content');
        const syncStatus = $('syncStatus');
        const welcomeOverlay = $('welcomeOverlay');
        const authOverlay = $('authOverlay');
        const authError = $('authError');
        const authSuccess = $('authSuccess');
        const app = $('app');

        // === ИНИЦИАЛИЗАЦИЯ SUPABASE ===
        try {
            supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
            console.log('✅ Supabase инициализирован');
        } catch (error) {
            console.error('❌ Ошибка инициализации Supabase:', error);
        }

        // === ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ===
        function formatDateKey(date) {
            const d = new Date(date);
            return d.getFullYear() + '-' + 
                   String(d.getMonth() + 1).padStart(2, '0') + '-' + 
                   String(d.getDate()).padStart(2, '0');
        }

        function formatDateDisplay(date) {
            const d = new Date(date);
            const months = ['Янв', 'Фев', 'Мар', 'Апр', 'Май', 'Июн', 'Июл', 'Авг', 'Сен', 'Окт', 'Ноя', 'Дек'];
            return d.getDate() + ' ' + months[d.getMonth()] + ' ' + d.getFullYear();
        }

        function formatWeekRange(date) {
            const start = new Date(date);
            start.setDate(start.getDate() - start.getDay() + 1);
            const end = new Date(start);
            end.setDate(end.getDate() + 6);
            const months = ['Янв', 'Фев', 'Мар', 'Апр', 'Май', 'Июн', 'Июл', 'Авг', 'Сен', 'Окт', 'Ноя', 'Дек'];
            if (start.getMonth() === end.getMonth()) {
                return start.getDate() + '–' + end.getDate() + ' ' + months[start.getMonth()];
            } else {
                return start.getDate() + ' ' + months[start.getMonth()] + ' – ' + 
                       end.getDate() + ' ' + months[end.getMonth()];
            }
        }

        function getWeekDays(date) {
            const start = new Date(date);
            start.setDate(start.getDate() - start.getDay() + 1);
            const days = [];
            for (let i = 0; i < 7; i++) {
                const d = new Date(start);
                d.setDate(d.getDate() + i);
                days.push(d);
            }
            return days;
        }

        function isToday(date) {
            const d = new Date(date);
            const t = new Date();
            return d.getFullYear() === t.getFullYear() &&
                   d.getMonth() === t.getMonth() &&
                   d.getDate() === t.getDate();
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function showSyncStatus(message) {
            syncStatus.textContent = message;
            syncStatus.classList.add('show');
            clearTimeout(syncTimeout);
            syncTimeout = setTimeout(() => {
                syncStatus.classList.remove('show');
            }, 1500);
        }

        function getRandomColor() {
            const colors = ['#D9ADD1', '#E26728', '#CBCADC', '#A8D5BA', '#F7DC6F', '#85C1E9', '#F1948A', '#82E0AA', '#85C1E9', '#F8C471'];
            return colors[Math.floor(Math.random() * colors.length)];
        }

        // === РАБОТА С ПОЛЬЗОВАТЕЛЯМИ ===
        async function loadUsers() {
            if (!supabase) return [];
            
            try {
                const { data, error } = await supabase
                    .from('users')
                    .select('*')
                    .order('name');
                
                if (error) throw error;
                return data || [];
            } catch (error) {
                console.error('Ошибка загрузки пользователей:', error);
                return [];
            }
        }

        async function createUser(userId, name) {
            if (!supabase || !userId || !name) return null;
            
            try {
                const { data, error } = await supabase
                    .from('users')
                    .insert([{
                        id: userId,
                        name: name.trim(),
                        color: getRandomColor()
                    }])
                    .select();
                
                if (error) throw error;
                return data[0];
            } catch (error) {
                console.error('Ошибка создания пользователя:', error);
                return null;
            }
        }

        async function getUserProfile(userId) {
            if (!supabase || !userId) return null;
            
            try {
                const { data, error } = await supabase
                    .from('users')
                    .select('*')
                    .eq('id', userId)
                    .single();
                
                if (error) throw error;
                return data;
            } catch (error) {
                console.error('Ошибка получения профиля:', error);
                return null;
            }
        }

        // === АВТОРИЗАЦИЯ ===
        async function checkAuth() {
            try {
                const { data: { session } } = await supabase.auth.getSession();
                const { data: { user } } = await supabase.auth.getUser();
                
                if (user && session) {
                    state.currentUser = user;
                    state.isAuthenticated = true;
                    
                    // Загружаем всех пользователей
                    const allUsers = await loadUsers();
                    state.users = allUsers;
                    
                    // Проверяем, есть ли профиль у текущего пользователя
                    let userProfile = await getUserProfile(user.id);
                    
                    if (!userProfile) {
                        // Если нет профиля — создаём с именем из email (временное)
                        const tempName = user.email ? user.email.split('@')[0] : 'Пользователь';
                        userProfile = await createUser(user.id, tempName);
                        if (userProfile) {
                            state.users = await loadUsers();
                        }
                    }
                    
                    // Находим выбранного пользователя
                    if (userProfile) {
                        state.selectedUser = userProfile;
                    } else {
                        // Если профиль не создался — пробуем ещё раз
                        const newProfile = await createUser(user.id, 'Пользователь');
                        if (newProfile) {
                            state.selectedUser = newProfile;
                            state.users = await loadUsers();
                        }
                    }
                    
                    authOverlay.classList.remove('show');
                    app.classList.add('show');
                    
                    subscribeToTasks();
                    render();
                    showSyncStatus('✅ Добро пожаловать, ' + (state.selectedUser?.name || '') + '!');
                    return true;
                } else {
                    state.currentUser = null;
                    state.isAuthenticated = false;
                    state.users = [];
                    state.selectedUser = null;
                    app.classList.remove('show');
                    authOverlay.classList.add('show');
                    return false;
                }
            } catch (error) {
                console.error('Ошибка проверки авторизации:', error);
                return false;
            }
        }

        async function signIn(email, password) {
            authError.textContent = '';
            authSuccess.textContent = '';
            try {
                const { data, error } = await supabase.auth.signInWithPassword({ email, password });
                if (error) throw error;
                await checkAuth();
            } catch (error) {
                authError.textContent = '❌ ' + error.message;
                console.error('Ошибка входа:', error);
            }
        }

        async function signUp(email, password, name) {
            authError.textContent = '';
            authSuccess.textContent = '';
            
            if (!name.trim()) {
                authError.textContent = '❌ Введите ваше имя';
                return;
            }
            
            try {
                const { data, error } = await supabase.auth.signUp({ 
                    email, 
                    password,
                    options: {
                        emailRedirectTo: window.location.origin
                    }
                });
                if (error) throw error;
                
                if (data.user?.identities?.length === 0) {
                    authError.textContent = '❌ Этот email уже зарегистрирован';
                    return;
                }
                
                // Создаём профиль пользователя
                if (data.user) {
                    await createUser(data.user.id, name.trim());
                }
                
                authSuccess.textContent = '✅ Проверьте почту для подтверждения!';
                setTimeout(() => {
                    authSuccess.textContent = '';
                }, 5000);
            } catch (error) {
                authError.textContent = '❌ ' + error.message;
                console.error('Ошибка регистрации:', error);
            }
        }

        async function signOut() {
            try {
                if (supabaseChannel) {
                    supabaseChannel.unsubscribe();
                    supabaseChannel = null;
                }
                await supabase.auth.signOut();
                state.currentUser = null;
                state.isAuthenticated = false;
                state.users = [];
                state.selectedUser = null;
                state.tasks = [];
                app.classList.remove('show');
                authOverlay.classList.add('show');
                showSyncStatus('👋 До свидания!');
            } catch (error) {
                console.error('Ошибка выхода:', error);
            }
        }

        // === РАБОТА С ЗАДАЧАМИ ===
        async function loadTasks(dateKey, weekMode = false) {
            if (!supabase || !state.currentUser) {
                console.warn('Supabase не инициализирован или пользователь не авторизован');
                return [];
            }

            try {
                let query = supabase
                    .from('tasks')
                    .select('*')
                    .order('time_start');

                if (weekMode) {
                    const weekDays = getWeekDays(new Date(dateKey));
                    const dateKeys = weekDays.map(d => formatDateKey(d));
                    query = query.in('date_key', dateKeys);
                } else {
                    query = query.eq('date_key', dateKey);
                }

                const { data, error } = await query;
                
                if (error) throw error;
                return data || [];
            } catch (error) {
                console.error('Ошибка загрузки задач:', error);
                showSyncStatus('❌ Ошибка загрузки');
                return [];
            }
        }

        async function addTask(dateKey, timeStart, timeEnd, text) {
            if (!supabase || !state.currentUser || !text.trim()) {
                console.error('❌ Ошибка: Supabase или пользователь не инициализирован');
                showSyncStatus('❌ Ошибка: войдите в аккаунт');
                return null;
            }

            const userId = state.currentUser.id;
            const userIndex = state.users.findIndex(u => u.id === userId);

            console.log('📝 Добавление задачи:', {
                user_id: userId,
                user_index: userIndex,
                date_key: dateKey,
                time_start: timeStart || '12:00',
                time_end: timeEnd || '',
                text: text.trim()
            });

            try {
                const { data, error } = await supabase
                    .from('tasks')
                    .insert([{
                        user_id: userId,
                        user_index: userIndex,
                        date_key: dateKey,
                        time_start: timeStart || '12:00',
                        time_end: timeEnd || '',
                        text: text.trim()
                    }])
                    .select();

                if (error) {
                    console.error('❌ Ошибка Supabase:', error);
                    showSyncStatus('❌ ' + error.message);
                    return null;
                }
                
                console.log('✅ Задача добавлена:', data);
                showSyncStatus('✅ Задача добавлена');
                return data[0];
            } catch (error) {
                console.error('❌ Критическая ошибка:', error);
                showSyncStatus('❌ Ошибка: ' + error.message);
                return null;
            }
        }

        async function deleteTask(taskId) {
            if (!supabase || !state.currentUser || !taskId) return false;

            try {
                const { error } = await supabase
                    .from('tasks')
                    .delete()
                    .eq('id', taskId)
                    .eq('user_id', state.currentUser.id);

                if (error) throw error;
                
                showSyncStatus('🗑️ Задача удалена');
                return true;
            } catch (error) {
                console.error('Ошибка удаления задачи:', error);
                showSyncStatus('❌ Ошибка удаления');
                return false;
            }
        }

        // === ПОДПИСКА НА ИЗМЕНЕНИЯ ===
        function subscribeToTasks() {
            if (supabaseChannel) {
                supabaseChannel.unsubscribe();
            }

            if (!supabase || !state.currentUser) return;

            supabaseChannel = supabase
                .channel('tasks-changes')
                .on(
                    'postgres_changes',
                    {
                        event: '*',
                        schema: 'public',
                        table: 'tasks'
                    },
                    async (payload) => {
                        console.log('🔄 Изменение в базе:', payload);
                        render();
                        showSyncStatus('🔄 Обновлено');
                    }
                )
                .subscribe((status) => {
                    console.log('📡 Подписка на изменения:', status);
                });
        }

        // === ОТРИСОВКА ===
        function render() {
            renderUserSelector();
            renderDateNav();
            renderContent();
        }

        function renderUserSelector() {
            if (!state.currentUser || state.users.length === 0) {
                userSelector.innerHTML = '';
                return;
            }

            let html = '';
            
            // Показываем всех пользователей из базы
            state.users.forEach((user) => {
                const isCurrent = state.selectedUser && state.selectedUser.id === user.id;
                html += `
                    <button class="user-btn ${isCurrent ? 'active' : ''}" 
                            data-user-id="${user.id}">
                        <span class="color-dot" style="background:${user.color || '#D9ADD1'}"></span>
                        ${escapeHtml(user.name)}
                        ${isCurrent ? ' ✎' : ''}
                    </button>
                `;
            });
            
            // Кнопка выхода
            html += `
                <button class="user-btn" style="border-color:rgba(255,255,255,0.15);background:rgba(255,255,255,0.05);">
                    <span class="color-dot" style="background:transparent;border:1px solid rgba(255,255,255,0.3);"></span>
                    <span style="font-weight:400;font-size:13px;">${escapeHtml(state.currentUser.email || '')}</span>
                    <button class="logout-btn" id="logoutBtn">🚪</button>
                </button>
            `;
            
            userSelector.innerHTML = html;

            userSelector.querySelectorAll('[data-user-id]').forEach(btn => {
                btn.addEventListener('click', () => {
                    const userId = btn.dataset.userId;
                    const selectedUser = state.users.find(u => u.id === userId);
                    if (selectedUser && state.selectedUser?.id !== userId) {
                        state.selectedUser = selectedUser;
                        render();
                    }
                });
            });

            const logoutBtn = document.getElementById('logoutBtn');
            if (logoutBtn) {
                logoutBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    if (confirm('Выйти из аккаунта?')) {
                        signOut();
                    }
                });
            }
        }

        function renderDateNav() {
            if (state.view === 'day') {
                dateDisplay.textContent = formatDateDisplay(state.currentDate);
            } else {
                dateDisplay.textContent = formatWeekRange(state.currentDate);
            }
        }

        function renderContent() {
            if (state.view === 'day') {
                renderDayView();
            } else {
                renderWeekView();
            }
        }

        function renderDayView() {
            const dateKey = formatDateKey(state.currentDate);
            
            loadTasks(dateKey).then(allTasks => {
                state.tasks = allTasks;
                
                let html = '<div class="day-view">';
                
                // Для каждого пользователя создаём отдельную карточку
                state.users.forEach((user) => {
                    const userTasks = allTasks.filter(t => t.user_id === user.id);
                    const isCurrentUser = state.selectedUser && state.selectedUser.id === user.id;
                    
                    html += `
                        <div class="day-card">
                            <div class="day-card-header">
                                <div class="color-bar" style="background:${user.color || '#D9ADD1'}"></div>
                                <span class="user-name">${escapeHtml(user.name)}</span>
                                <span class="badge">${isCurrentUser ? '✎ вы' : '👀 просмотр'}</span>
                            </div>
                            <div class="tasks" data-date="${dateKey}">
                    `;
                    
                    if (userTasks.length === 0) {
                        html += `<div class="task-empty">${isCurrentUser ? 'Нет планов 🌸' : '—'}</div>`;
                    } else {
                        userTasks.sort((a, b) => a.time_start.localeCompare(b.time_start));
                        userTasks.forEach(task => {
                            const timeDisplay = task.time_end ? 
                                `${escapeHtml(task.time_start)}–${escapeHtml(task.time_end)}` : 
                                escapeHtml(task.time_start);
                            
                            const isOwn = task.user_id === state.currentUser.id;
                            
                            html += `
                                <div class="task-item ${!isOwn ? 'other-user' : ''}" data-task-id="${task.id}">
                                    <span class="task-time">${timeDisplay}</span>
                                    <span class="task-text">${escapeHtml(task.text)}</span>
                                    ${isOwn ? `
                                        <div class="task-actions">
                                            <button class="task-btn delete" data-action="delete" 
                                                    data-task-id="${task.id}" 
                                                    data-task-text="${escapeHtml(task.text)}">✕</button>
                                        </div>
                                    ` : ''}
                                </div>
                            `;
                        });
                    }
                    
                    html += `
                            </div>
                            ${isCurrentUser ? `
                                <div class="add-task-form" data-date="${dateKey}">
                                    <div class="time-group">
                                        <input type="time" class="task-time-start" value="12:00">
                                        <span>–</span>
                                        <input type="time" class="task-time-end" value="">
                                    </div>
                                    <input type="text" class="task-text-input" placeholder="Что планируете?" maxlength="100">
                                    <button class="add-btn" data-action="add">+</button>
                                </div>
                            ` : ''}
                        </div>
                    `;
                });
                
                html += '</div>';
                content.innerHTML = html;
                attachTaskEvents();
            });
        }

        function renderWeekView() {
            const weekDays = getWeekDays(state.currentDate);
            const weekDayNames = ['ПН', 'ВТ', 'СР', 'ЧТ', 'ПТ', 'СБ', 'ВС'];
            const dateKey = formatDateKey(state.currentDate);
            
            loadTasks(dateKey, true).then(allTasks => {
                state.tasks = allTasks;
                
                let html = '<div class="week-compact">';
                
                state.users.forEach((user) => {
                    const isCurrentUser = state.selectedUser && state.selectedUser.id === user.id;
                    
                    html += `
                        <div class="week-card">
                            <div class="week-header">
                                <div class="color-bar" style="background:${user.color || '#D9ADD1'}"></div>
                                <span class="user-name">${escapeHtml(user.name)}</span>
                                <span class="badge">${isCurrentUser ? '✎ вы' : '👀 просмотр'}</span>
                            </div>
                    `;
                    
                    weekDays.forEach((day, idx) => {
                        const dayKey = formatDateKey(day);
                        const dayTasks = allTasks.filter(t => t.date_key === dayKey && t.user_id === user.id);
                        const today = isToday(day);
                        const dayName = weekDayNames[idx];
                        const dayNum = day.getDate();
                        
                        html += `
                            <div class="week-day-row" data-date="${dayKey}">
                                <div class="day-label ${today ? 'today' : ''}">${dayName} ${dayNum}</div>
                                <div class="day-tasks">
                        `;
                        
                        if (dayTasks.length === 0) {
                            html += `<span class="week-empty-text">—</span>`;
                        } else {
                            dayTasks.sort((a, b) => a.time_start.localeCompare(b.time_start));
                            dayTasks.forEach(task => {
                                const timeDisplay = task.time_end ? 
                                    `${escapeHtml(task.time_start)}–${escapeHtml(task.time_end)}` : 
                                    escapeHtml(task.time_start);
                                const isOwn = task.user_id === state.currentUser.id;
                                
                                html += `
                                    <span class="wtask">
                                        <span class="wtask-time">${timeDisplay}</span>
                                        ${escapeHtml(task.text)}
                                        ${isOwn ? `
                                            <button class="wtask-delete" data-action="delete" 
                                                    data-task-id="${task.id}" 
                                                    data-task-text="${escapeHtml(task.text)}">✕</button>
                                        ` : ''}
                                    </span>
                                `;
                            });
                        }
                        
                        html += `
                                </div>
                            </div>
                        `;
                    });
                    
                    if (isCurrentUser) {
                        html += `
                            <div class="week-add-form">
                                <select class="wa-day-select">
                                    ${weekDays.map((day, idx) => `
                                        <option value="${formatDateKey(day)}">${weekDayNames[idx]} ${day.getDate()}</option>
                                    `).join('')}
                                </select>
                                <div class="time-group">
                                    <input type="time" class="wa-time-start" value="12:00">
                                    <span>–</span>
                                    <input type="time" class="wa-time-end" value="">
                                </div>
                                <input type="text" class="wa-text-input" placeholder="План" maxlength="60">
                                <button class="add-btn" data-action="add-week">+</button>
                            </div>
                        `;
                    }
                    
                    html += `</div>`;
                });
                
                html += '</div>';
                content.innerHTML = html;
                attachWeekEvents();
            });
        }

        // === ОБРАБОТЧИКИ СОБЫТИЙ ===
        function attachTaskEvents() {
            document.querySelectorAll('[data-action="delete"]').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const taskId = btn.dataset.taskId;
                    const taskText = btn.dataset.taskText || 'Задача';
                    showDeleteModal(taskId, taskText);
                });
            });
            
            document.querySelectorAll('[data-action="add"]').forEach(btn => {
                btn.addEventListener('click', async () => {
                    const form = btn.closest('.add-task-form');
                    const timeStart = form.querySelector('.task-time-start');
                    const timeEnd = form.querySelector('.task-time-end');
                    const textInput = form.querySelector('.task-text-input');
                    const dateKey = form.dataset.date;
                    
                    const start = timeStart.value || '12:00';
                    const end = timeEnd.value || '';
                    const text = textInput.value.trim();
                    
                    if (!text) {
                        textInput.focus();
                        textInput.style.borderColor = '#e74c3c';
                        setTimeout(() => textInput.style.borderColor = '', 2000);
                        return;
                    }
                    
                    await addTask(dateKey, start, end, text);
                    render();
                });
            });
            
            document.querySelectorAll('.task-text-input').forEach(input => {
                input.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') {
                        const form = input.closest('.add-task-form');
                        const addBtn = form.querySelector('[data-action="add"]');
                        if (addBtn) addBtn.click();
                    }
                });
            });
        }

        function attachWeekEvents() {
            document.querySelectorAll('.wtask-delete').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const taskId = btn.dataset.taskId;
                    const taskText = btn.dataset.taskText || 'Задача';
                    showDeleteModal(taskId, taskText);
                });
            });
            
            document.querySelectorAll('[data-action="add-week"]').forEach(btn => {
                btn.addEventListener('click', async () => {
                    const form = btn.closest('.week-add-form');
                    const daySelect = form.querySelector('.wa-day-select');
                    const timeStart = form.querySelector('.wa-time-start');
                    const timeEnd = form.querySelector('.wa-time-end');
                    const textInput = form.querySelector('.wa-text-input');
                    
                    const dateKey = daySelect.value;
                    const start = timeStart.value || '12:00';
                    const end = timeEnd.value || '';
                    const text = textInput.value.trim();
                    
                    if (!text) {
                        textInput.focus();
                        textInput.style.borderColor = '#e74c3c';
                        setTimeout(() => textInput.style.borderColor = '', 2000);
                        return;
                    }
                    
                    await addTask(dateKey, start, end, text);
                    render();
                });
            });
            
            document.querySelectorAll('.wa-text-input').forEach(input => {
                input.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') {
                        const form = input.closest('.week-add-form');
                        const addBtn = form.querySelector('[data-action="add-week"]');
                        if (addBtn) addBtn.click();
                    }
                });
            });
        }

        // === МОДАЛЬНОЕ ОКНО УДАЛЕНИЯ ===
        function showDeleteModal(taskId, taskText) {
            deleteTarget = taskId;
            
            const modal = document.createElement('div');
            modal.className = 'modal-overlay';
            modal.id = 'deleteModal';
            modal.innerHTML = `
                <div class="modal-content">
                    <div class="modal-icon">🗑️</div>
                    <h3>Удалить задачу?</h3>
                    <p>Вы уверены, что хотите удалить эту задачу?</p>
                    <div class="task-preview">${escapeHtml(taskText)}</div>
                    <div class="modal-actions">
                        <button class="btn-cancel" id="modalCancel">Отмена</button>
                        <button class="btn-delete" id="modalConfirm">Удалить</button>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);

            document.getElementById('modalCancel').addEventListener('click', () => {
                closeModal();
            });

            document.getElementById('modalConfirm').addEventListener('click', async () => {
                if (deleteTarget) {
                    await deleteTask(deleteTarget);
                    deleteTarget = null;
                    closeModal();
                    render();
                }
            });

            modal.addEventListener('click', (e) => {
                if (e.target === modal) closeModal();
            });
        }

        function closeModal() {
            const modal = document.getElementById('deleteModal');
            if (modal) modal.remove();
            deleteTarget = null;
        }

        // === НАВИГАЦИЯ ===
        document.getElementById('prevDate').addEventListener('click', () => {
            if (state.view === 'day') {
                state.currentDate.setDate(state.currentDate.getDate() - 1);
            } else {
                state.currentDate.setDate(state.currentDate.getDate() - 7);
            }
            render();
        });

        document.getElementById('nextDate').addEventListener('click', () => {
            if (state.view === 'day') {
                state.currentDate.setDate(state.currentDate.getDate() + 1);
            } else {
                state.currentDate.setDate(state.currentDate.getDate() + 7);
            }
            render();
        });

        document.getElementById('todayBtn').addEventListener('click', () => {
            state.currentDate = new Date();
            render();
        });

        // === ПЕРЕКЛЮЧЕНИЕ ВИДОВ ===
        document.getElementById('viewDay').addEventListener('click', () => {
            state.view = 'day';
            document.getElementById('viewDay').classList.add('active');
            document.getElementById('viewWeek').classList.remove('active');
            render();
        });

        document.getElementById('viewWeek').addEventListener('click', () => {
            state.view = 'week';
            document.getElementById('viewWeek').classList.add('active');
            document.getElementById('viewDay').classList.remove('active');
            render();
        });

        // === ПРИВЕТСТВИЕ ===
        const welcomeBtn = document.getElementById('welcomeBtn');
        welcomeBtn.addEventListener('click', () => {
            welcomeOverlay.style.opacity = '0';
            welcomeOverlay.style.transition = 'opacity 0.5s ease';
            setTimeout(() => {
                welcomeOverlay.style.display = 'none';
            }, 500);
        });

        // === АВТОРИЗАЦИЯ ===
        document.getElementById('signInBtn').addEventListener('click', () => {
            const email = document.getElementById('authEmail').value;
            const password = document.getElementById('authPassword').value;
            if (email && password) {
                signIn(email, password);
            } else {
                authError.textContent = '❌ Введите email и пароль';
            }
        });

        document.getElementById('signUpBtn').addEventListener('click', () => {
            const email = document.getElementById('authEmail').value;
            const password = document.getElementById('authPassword').value;
            const name = document.getElementById('authName').value;
            
            if (!email || !password || !name) {
                authError.textContent = '❌ Заполните все поля';
                return;
            }
            
            if (password.length < 6) {
                authError.textContent = '❌ Пароль должен быть не менее 6 символов';
                return;
            }
            
            signUp(email, password, name);
        });

        document.getElementById('authEmail').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                document.getElementById('authPassword').focus();
            }
        });

        document.getElementById('authPassword').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                document.getElementById('authName').focus();
            }
        });

        document.getElementById('authName').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                document.getElementById('signUpBtn').click();
            }
        });

        // === ИНИЦИАЛИЗАЦИЯ ===
        checkAuth();
    </script>
</body>
</html>
