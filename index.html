<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Планер">
    <meta name="theme-color" content="#D9ADD1">
    <title>Календарь-планер</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        /* ... весь ваш CSS остаётся без изменений ... */
        /* (сохраните все стили из предыдущей версии) */
        
        /* Добавляем стиль для отметки "чужая задача" */
        .task-item.other-user {
            opacity: 0.85;
            border-left: 3px solid #ccc;
        }
        
        .task-item.other-user .task-actions {
            display: none;
        }
        
        .task-item .task-user-label {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-light);
            background: rgba(0, 0, 0, 0.04);
            padding: 2px 8px;
            border-radius: 10px;
            margin-right: 8px;
            white-space: nowrap;
        }
        
        .task-item .task-user-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 4px;
            flex-shrink: 0;
        }
    </style>
</head>
<body>
    <!-- ... остальной HTML остаётся без изменений ... -->
    <!-- (сохраните всю разметку из предыдущей версии) -->

    <script>
        (function() {
            'use strict';

            // === КОНФИГУРАЦИЯ ===
            const SUPABASE_URL = 'https://hrwoenkrfducxuduuvfr.supabase.co';
            const SUPABASE_KEY = 'sb_publishable_zwmmH6vHObejL0S_z7MdSg_Vq303EH4';

            const COLORS = ['#D9ADD1', '#E26728', '#CBCADC'];
            const USER_NAMES = ['Лизик', 'Дашик', 'Катик'];

            // === ИНИЦИАЛИЗАЦИЯ ===
            const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

            let state = {
                view: 'day',
                selectedUser: 0,
                currentDate: new Date(),
                tasks: [], // Все задачи (всех пользователей)
                currentUser: null,
                isAuthenticated: false
            };

            let deleteTarget = null;
            let syncTimeout = null;
            let supabaseChannel = null;

            // === DOM ===
            const $ = id => document.getElementById(id);
            const userSelector = $('userSelector');
            const dateDisplay = $('dateDisplay');
            const content = $('content');
            const syncStatus = $('syncStatus');
            const authOverlay = $('authOverlay');
            const welcomeOverlay = $('welcomeOverlay');
            const authError = $('authError');

            // === ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ===
            function formatDateKey(date) {
                const d = new Date(date);
                return d.getFullYear() + '-' + 
                       String(d.getMonth() + 1).padStart(2, '0') + '-' + 
                       String(d.getDate()).padStart(2, '0');
            }

            function formatDateDisplay(date) {
                const d = new Date(date);
                const months = ['Янв', 'Фев', 'Мар', 'Апр', 'Май', 'Июн', 'Июл', 'Авг', 'Сен', 'Окт', 'Ноя', 'Дек'];
                return d.getDate() + ' ' + months[d.getMonth()] + ' ' + d.getFullYear();
            }

            function formatWeekRange(date) {
                const start = new Date(date);
                start.setDate(start.getDate() - start.getDay() + 1);
                const end = new Date(start);
                end.setDate(end.getDate() + 6);
                const months = ['Янв', 'Фев', 'Мар', 'Апр', 'Май', 'Июн', 'Июл', 'Авг', 'Сен', 'Окт', 'Ноя', 'Дек'];
                if (start.getMonth() === end.getMonth()) {
                    return start.getDate() + '–' + end.getDate() + ' ' + months[start.getMonth()];
                } else {
                    return start.getDate() + ' ' + months[start.getMonth()] + ' – ' + 
                           end.getDate() + ' ' + months[end.getMonth()];
                }
            }

            function getWeekDays(date) {
                const start = new Date(date);
                start.setDate(start.getDate() - start.getDay() + 1);
                const days = [];
                for (let i = 0; i < 7; i++) {
                    const d = new Date(start);
                    d.setDate(d.getDate() + i);
                    days.push(d);
                }
                return days;
            }

            function isToday(date) {
                const d = new Date(date);
                const t = new Date();
                return d.getFullYear() === t.getFullYear() &&
                       d.getMonth() === t.getMonth() &&
                       d.getDate() === t.getDate();
            }

            function escapeHtml(text) {
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }

            function showSyncStatus(message) {
                syncStatus.textContent = message;
                syncStatus.classList.add('show');
                clearTimeout(syncTimeout);
                syncTimeout = setTimeout(() => {
                    syncStatus.classList.remove('show');
                }, 1500);
            }

            function getUserIdByIndex(index) {
                // В реальном приложении здесь нужно получить реальный ID пользователя из базы
                // Для демонстрации используем фиктивные UUID
                const fakeIds = [
                    '11111111-1111-1111-1111-111111111111',
                    '22222222-2222-2222-2222-222222222222',
                    '33333333-3333-3333-3333-333333333333'
                ];
                return fakeIds[index] || fakeIds[0];
            }

            // === РАБОТА С БАЗОЙ ДАННЫХ ===
            async function loadAllTasksForDate(dateKey) {
                if (!state.currentUser) return [];

                try {
                    // Загружаем ВСЕ задачи на эту дату (без фильтра по user_id)
                    const { data, error } = await supabase
                        .from('tasks')
                        .select('*')
                        .eq('date_key', dateKey)
                        .order('time_start');

                    if (error) throw error;
                    return data || [];
                } catch (error) {
                    console.error('Ошибка загрузки задач:', error);
                    showSyncStatus('❌ Ошибка загрузки');
                    return [];
                }
            }

            async function loadAllTasksForWeek(dateKey) {
                if (!state.currentUser) return [];

                try {
                    // Загружаем ВСЕ задачи на неделю (без фильтра по user_id)
                    const weekDays = getWeekDays(new Date(dateKey));
                    const dateKeys = weekDays.map(d => formatDateKey(d));
                    
                    const { data, error } = await supabase
                        .from('tasks')
                        .select('*')
                        .in('date_key', dateKeys)
                        .order('time_start');

                    if (error) throw error;
                    return data || [];
                } catch (error) {
                    console.error('Ошибка загрузки задач:', error);
                    showSyncStatus('❌ Ошибка загрузки');
                    return [];
                }
            }

            async function addTaskToSupabase(dateKey, timeStart, timeEnd, text) {
                if (!state.currentUser || !text.trim()) return null;

                try {
                    const { data, error } = await supabase
                        .from('tasks')
                        .insert([{
                            user_id: state.currentUser.id,
                            date_key: dateKey,
                            time_start: timeStart || '12:00',
                            time_end: timeEnd || '',
                            text: text.trim()
                        }])
                        .select();

                    if (error) throw error;
                    
                    showSyncStatus('✅ Задача добавлена');
                    return data[0];
                } catch (error) {
                    console.error('Ошибка добавления задачи:', error);
                    showSyncStatus('❌ Ошибка добавления');
                    return null;
                }
            }

            async function deleteTaskFromSupabase(taskId) {
                if (!state.currentUser || !taskId) return false;

                try {
                    const { error } = await supabase
                        .from('tasks')
                        .delete()
                        .eq('id', taskId)
                        .eq('user_id', state.currentUser.id); // Важно: только свои задачи!

                    if (error) throw error;
                    
                    showSyncStatus('🗑️ Задача удалена');
                    return true;
                } catch (error) {
                    console.error('Ошибка удаления задачи:', error);
                    showSyncStatus('❌ Ошибка удаления');
                    return false;
                }
            }

            // === ПОДПИСКА НА ИЗМЕНЕНИЯ ===
            function subscribeToTasks() {
                if (supabaseChannel) {
                    supabaseChannel.unsubscribe();
                }

                if (!state.currentUser) return;

                // Подписываемся на ВСЕ изменения (без фильтра по user_id)
                supabaseChannel = supabase
                    .channel('tasks-changes')
                    .on(
                        'postgres_changes',
                        {
                            event: '*',
                            schema: 'public',
                            table: 'tasks'
                        },
                        async (payload) => {
                            console.log('Изменение в базе:', payload);
                            render();
                            showSyncStatus('🔄 Обновлено');
                        }
                    )
                    .subscribe((status) => {
                        console.log('Подписка на изменения:', status);
                    });
            }

            // === АВТОРИЗАЦИЯ ===
            async function checkAuth() {
                try {
                    const { data: { session } } = await supabase.auth.getSession();
                    const { data: { user } } = await supabase.auth.getUser();
                    
                    if (user && session) {
                        state.currentUser = user;
                        state.isAuthenticated = true;
                        subscribeToTasks();
                        authOverlay.classList.remove('show');
                        document.getElementById('app').style.display = 'flex';
                        render();
                        return true;
                    } else {
                        state.currentUser = null;
                        state.isAuthenticated = false;
                        document.getElementById('app').style.display = 'none';
                        authOverlay.classList.add('show');
                        return false;
                    }
                } catch (error) {
                    console.error('Ошибка проверки авторизации:', error);
                    return false;
                }
            }

            async function signIn(email, password) {
                authError.textContent = '';
                try {
                    const { data, error } = await supabase.auth.signInWithPassword({ email, password });
                    if (error) throw error;
                    await checkAuth();
                    showSyncStatus('✅ Добро пожаловать!');
                } catch (error) {
                    authError.textContent = '❌ ' + error.message;
                    console.error('Ошибка входа:', error);
                }
            }

            async function signUp(email, password) {
                authError.textContent = '';
                try {
                    const { data, error } = await supabase.auth.signUp({ 
                        email, 
                        password,
                        options: {
                            emailRedirectTo: window.location.origin
                        }
                    });
                    if (error) throw error;
                    
                    if (data.user?.identities?.length === 0) {
                        authError.textContent = '❌ Этот email уже зарегистрирован';
                        return;
                    }
                    
                    authError.textContent = '✅ Проверьте почту для подтверждения!';
                    authError.style.color = '#27ae60';
                    setTimeout(() => {
                        authError.textContent = '';
                        authError.style.color = '#e74c3c';
                    }, 5000);
                } catch (error) {
                    authError.textContent = '❌ ' + error.message;
                    console.error('Ошибка регистрации:', error);
                }
            }

            async function signOut() {
                try {
                    if (supabaseChannel) {
                        supabaseChannel.unsubscribe();
                        supabaseChannel = null;
                    }
                    await supabase.auth.signOut();
                    state.currentUser = null;
                    state.isAuthenticated = false;
                    state.tasks = [];
                    document.getElementById('app').style.display = 'none';
                    authOverlay.classList.add('show');
                    showSyncStatus('👋 До свидания!');
                } catch (error) {
                    console.error('Ошибка выхода:', error);
                }
            }

            // === ОТРИСОВКА ===
            function render() {
                renderUserSelector();
                renderDateNav();
                renderContent();
            }

            function renderUserSelector() {
                if (!state.currentUser) {
                    userSelector.innerHTML = '';
                    return;
                }

                const email = state.currentUser.email || 'Пользователь';
                const displayName = email.split('@')[0] || email;
                
                userSelector.innerHTML = `
                    <button class="user-btn active">
                        <span class="color-dot" style="background:#D9ADD1"></span>
                        👤 ${escapeHtml(displayName)}
                        <button class="logout-btn" id="logoutBtn">🚪</button>
                    </button>
                    <span style="color:rgba(255,255,255,0.6);font-size:13px;display:flex;align-items:center;padding:0 8px;">
                        👀 вижу всех
                    </span>
                `;

                const logoutBtn = document.getElementById('logoutBtn');
                if (logoutBtn) {
                    logoutBtn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        if (confirm('Выйти из аккаунта?')) {
                            signOut();
                        }
                    });
                }
            }

            function renderDateNav() {
                if (state.view === 'day') {
                    dateDisplay.textContent = formatDateDisplay(state.currentDate);
                } else {
                    dateDisplay.textContent = formatWeekRange(state.currentDate);
                }
            }

            function renderContent() {
                if (state.view === 'day') {
                    renderDayView();
                } else {
                    renderWeekView();
                }
            }

            function renderDayView() {
                const dateKey = formatDateKey(state.currentDate);
                
                loadAllTasksForDate(dateKey).then(tasks => {
                    state.tasks = tasks;
                    
                    // Группируем задачи по пользователям
                    const grouped = {};
                    tasks.forEach(task => {
                        if (!grouped[task.user_id]) grouped[task.user_id] = [];
                        grouped[task.user_id].push(task);
                    });
                    
                    let html = '<div class="day-view">';
                    
                    // Показываем всех пользователей (3 штуки)
                    for (let u = 0; u < 3; u++) {
                        const userId = getUserIdByIndex(u);
                        const userTasks = grouped[userId] || [];
                        const isCurrentUser = state.currentUser && state.currentUser.id === userId;
                        
                        html += `
                            <div class="day-card">
                                <div class="day-card-header">
                                    <div class="color-bar" style="background:${COLORS[u]}"></div>
                                    <span class="user-name">${escapeHtml(USER_NAMES[u])}</span>
                                    <span class="badge">${isCurrentUser ? '✎ вы' : '👀 просмотр'}</span>
                                </div>
                                <div class="tasks" data-date="${dateKey}" data-user="${u}">
                        `;
                        
                        if (userTasks.length === 0) {
                            html += `<div class="task-empty">${isCurrentUser ? 'Нет планов 🌸' : '—'}</div>`;
                        } else {
                            userTasks.sort((a, b) => a.time_start.localeCompare(b.time_start));
                            userTasks.forEach(task => {
                                const timeDisplay = task.time_end ? 
                                    `${escapeHtml(task.time_start)}–${escapeHtml(task.time_end)}` : 
                                    escapeHtml(task.time_start);
                                
                                // Только свой задачи можно редактировать
                                const canEdit = isCurrentUser;
                                
                                html += `
                                    <div class="task-item ${!canEdit ? 'other-user' : ''}" data-task-id="${task.id}">
                                        <span class="task-time">${timeDisplay}</span>
                                        <span class="task-text">${escapeHtml(task.text)}</span>
                                        ${canEdit ? `
                                            <div class="task-actions">
                                                <button class="task-btn delete" data-action="delete" 
                                                        data-task-id="${task.id}" 
                                                        data-task-text="${escapeHtml(task.text)}">✕</button>
                                            </div>
                                        ` : ''}
                                    </div>
                                `;
                            });
                        }
                        
                        html += `
                                </div>
                                ${isCurrentUser ? `
                                    <div class="add-task-form" data-date="${dateKey}">
                                        <div class="time-group">
                                            <input type="time" class="task-time-start" value="12:00">
                                            <span>–</span>
                                            <input type="time" class="task-time-end" value="">
                                        </div>
                                        <input type="text" class="task-text-input" placeholder="Что планируете?" maxlength="100">
                                        <button class="add-btn" data-action="add">+</button>
                                    </div>
                                ` : ''}
                            </div>
                        `;
                    }
                    
                    html += '</div>';
                    content.innerHTML = html;
                    attachTaskEvents();
                });
            }

            function renderWeekView() {
                const weekDays = getWeekDays(state.currentDate);
                const weekDayNames = ['ПН', 'ВТ', 'СР', 'ЧТ', 'ПТ', 'СБ', 'ВС'];
                const dateKeys = weekDays.map(d => formatDateKey(d));
                
                loadAllTasksForWeek(formatDateKey(state.currentDate)).then(tasks => {
                    state.tasks = tasks;
                    
                    let html = '<div class="week-compact">';
                    
                    // Показываем всех пользователей (3 штуки)
                    for (let u = 0; u < 3; u++) {
                        const userId = getUserIdByIndex(u);
                        const isCurrentUser = state.currentUser && state.currentUser.id === userId;
                        
                        html += `
                            <div class="week-card">
                                <div class="week-header">
                                    <div class="color-bar" style="background:${COLORS[u]}"></div>
                                    <span class="user-name">${escapeHtml(USER_NAMES[u])}</span>
                                    <span class="badge">${isCurrentUser ? '✎ вы' : '👀 просмотр'}</span>
                                </div>
                        `;
                        
                        weekDays.forEach((day, idx) => {
                            const dateKey = formatDateKey(day);
                            const dayTasks = tasks.filter(t => t.date_key === dateKey && t.user_id === userId);
                            const today = isToday(day);
                            const dayName = weekDayNames[idx];
                            const dayNum = day.getDate();
                            
                            html += `
                                <div class="week-day-row" data-date="${dateKey}">
                                    <div class="day-label ${today ? 'today' : ''}">${dayName} ${dayNum}</div>
                                    <div class="day-tasks">
                            `;
                            
                            if (dayTasks.length === 0) {
                                html += `<span class="week-empty-text">—</span>`;
                            } else {
                                dayTasks.sort((a, b) => a.time_start.localeCompare(b.time_start));
                                dayTasks.forEach(task => {
                                    const timeDisplay = task.time_end ? 
                                        `${escapeHtml(task.time_start)}–${escapeHtml(task.time_end)}` : 
                                        escapeHtml(task.time_start);
                                    const canEdit = isCurrentUser;
                                    
                                    html += `
                                        <span class="wtask">
                                            <span class="wtask-time">${timeDisplay}</span>
                                            ${escapeHtml(task.text)}
                                            ${canEdit ? `
                                                <button class="wtask-delete" data-action="delete" 
                                                        data-task-id="${task.id}" 
                                                        data-task-text="${escapeHtml(task.text)}">✕</button>
                                            ` : ''}
                                        </span>
                                    `;
                                });
                            }
                            
                            html += `
                                    </div>
                                </div>
                            `;
                        });
                        
                        if (isCurrentUser) {
                            html += `
                                <div class="week-add-form">
                                    <select class="wa-day-select">
                                        ${weekDays.map((day, idx) => `
                                            <option value="${formatDateKey(day)}">${weekDayNames[idx]} ${day.getDate()}</option>
                                        `).join('')}
                                    </select>
                                    <div class="time-group">
                                        <input type="time" class="wa-time-start" value="12:00">
                                        <span>–</span>
                                        <input type="time" class="wa-time-end" value="">
                                    </div>
                                    <input type="text" class="wa-text-input" placeholder="План" maxlength="60">
                                    <button class="add-btn" data-action="add-week">+</button>
                                </div>
                            `;
                        }
                        
                        html += `</div>`;
                    }
                    
                    html += '</div>';
                    content.innerHTML = html;
                    attachWeekEvents();
                });
            }

            // === ОБРАБОТЧИКИ СОБЫТИЙ ===
            function attachTaskEvents() {
                document.querySelectorAll('[data-action="delete"]').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        const taskId = btn.dataset.taskId;
                        const taskText = btn.dataset.taskText || 'Задача';
                        showDeleteModal(taskId, taskText);
                    });
                });
                
                document.querySelectorAll('[data-action="add"]').forEach(btn => {
                    btn.addEventListener('click', async () => {
                        const form = btn.closest('.add-task-form');
                        const timeStart = form.querySelector('.task-time-start');
                        const timeEnd = form.querySelector('.task-time-end');
                        const textInput = form.querySelector('.task-text-input');
                        const dateKey = form.dataset.date;
                        
                        const start = timeStart.value || '12:00';
                        const end = timeEnd.value || '';
                        const text = textInput.value.trim();
                        
                        if (!text) {
                            textInput.focus();
                            textInput.style.borderColor = '#e74c3c';
                            setTimeout(() => textInput.style.borderColor = '', 2000);
                            return;
                        }
                        
                        await addTaskToSupabase(dateKey, start, end, text);
                        render();
                    });
                });
                
                document.querySelectorAll('.task-text-input').forEach(input => {
                    input.addEventListener('keypress', (e) => {
                        if (e.key === 'Enter') {
                            const form = input.closest('.add-task-form');
                            const addBtn = form.querySelector('[data-action="add"]');
                            if (addBtn) addBtn.click();
                        }
                    });
                });
            }

            function attachWeekEvents() {
                document.querySelectorAll('.wtask-delete').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        const taskId = btn.dataset.taskId;
                        const taskText = btn.dataset.taskText || 'Задача';
                        showDeleteModal(taskId, taskText);
                    });
                });
                
                document.querySelectorAll('[data-action="add-week"]').forEach(btn => {
                    btn.addEventListener('click', async () => {
                        const form = btn.closest('.week-add-form');
                        const daySelect = form.querySelector('.wa-day-select');
                        const timeStart = form.querySelector('.wa-time-start');
                        const timeEnd = form.querySelector('.wa-time-end');
                        const textInput = form.querySelector('.wa-text-input');
                        
                        const dateKey = daySelect.value;
                        const start = timeStart.value || '12:00';
                        const end = timeEnd.value || '';
                        const text = textInput.value.trim();
                        
                        if (!text) {
                            textInput.focus();
                            textInput.style.borderColor = '#e74c3c';
                            setTimeout(() => textInput.style.borderColor = '', 2000);
                            return;
                        }
                        
                        await addTaskToSupabase(dateKey, start, end, text);
                        render();
                    });
                });
                
                document.querySelectorAll('.wa-text-input').forEach(input => {
                    input.addEventListener('keypress', (e) => {
                        if (e.key === 'Enter') {
                            const form = input.closest('.week-add-form');
                            const addBtn = form.querySelector('[data-action="add-week"]');
                            if (addBtn) addBtn.click();
                        }
                    });
                });
            }

            // === МОДАЛЬНОЕ ОКНО УДАЛЕНИЯ ===
            function showDeleteModal(taskId, taskText) {
                deleteTarget = taskId;
                
                const modal = document.createElement('div');
                modal.className = 'modal-overlay';
                modal.id = 'deleteModal';
                modal.innerHTML = `
                    <div class="modal-content">
                        <div class="modal-icon">🗑️</div>
                        <h3>Удалить задачу?</h3>
                        <p>Вы уверены, что хотите удалить эту задачу?</p>
                        <div class="task-preview">${escapeHtml(taskText)}</div>
                        <div class="modal-actions">
                            <button class="btn-cancel" id="modalCancel">Отмена</button>
                            <button class="btn-delete" id="modalConfirm">Удалить</button>
                        </div>
                    </div>
                `;
                document.body.appendChild(modal);

                document.getElementById('modalCancel').addEventListener('click', () => {
                    closeModal();
                });

                document.getElementById('modalConfirm').addEventListener('click', async () => {
                    if (deleteTarget) {
                        await deleteTaskFromSupabase(deleteTarget);
                        deleteTarget = null;
                        closeModal();
                        render();
                    }
                });

                modal.addEventListener('click', (e) => {
                    if (e.target === modal) closeModal();
                });
            }

            function closeModal() {
                const modal = document.getElementById('deleteModal');
                if (modal) modal.remove();
                deleteTarget = null;
            }

            // === НАВИГАЦИЯ ===
            document.getElementById('prevDate').addEventListener('click', () => {
                if (state.view === 'day') {
                    state.currentDate.setDate(state.currentDate.getDate() - 1);
                } else {
                    state.currentDate.setDate(state.currentDate.getDate() - 7);
                }
                render();
            });

            document.getElementById('nextDate').addEventListener('click', () => {
                if (state.view === 'day') {
                    state.currentDate.setDate(state.currentDate.getDate() + 1);
                } else {
                    state.currentDate.setDate(state.currentDate.getDate() + 7);
                }
                render();
            });

            document.getElementById('todayBtn').addEventListener('click', () => {
                state.currentDate = new Date();
                render();
            });

            // === ПЕРЕКЛЮЧЕНИЕ ВИДОВ ===
            document.getElementById('viewDay').addEventListener('click', () => {
                state.view = 'day';
                document.getElementById('viewDay').classList.add('active');
                document.getElementById('viewWeek').classList.remove('active');
                render();
            });

            document.getElementById('viewWeek').addEventListener('click', () => {
                state.view = 'week';
                document.getElementById('viewWeek').classList.add('active');
                document.getElementById('viewDay').classList.remove('active');
                render();
            });

            // === ПРИВЕТСТВИЕ ===
            const welcomeBtn = document.getElementById('welcomeBtn');
            welcomeBtn.addEventListener('click', () => {
                welcomeOverlay.style.opacity = '0';
                welcomeOverlay.style.transition = 'opacity 0.5s ease';
                setTimeout(() => {
                    welcomeOverlay.style.display = 'none';
                }, 500);
            });

            // === АВТОРИЗАЦИЯ ===
            document.getElementById('signInBtn').addEventListener('click', () => {
                const email = document.getElementById('authEmail').value;
                const password = document.getElementById('authPassword').value;
                if (email && password) {
                    signIn(email, password);
                } else {
                    authError.textContent = '❌ Введите email и пароль';
                }
            });

            document.getElementById('signUpBtn').addEventListener('click', () => {
                const email = document.getElementById('authEmail').value;
                const password = document.getElementById('authPassword').value;
                if (email && password && password.length >= 6) {
                    signUp(email, password);
                } else if (password.length < 6) {
                    authError.textContent = '❌ Пароль должен быть не менее 6 символов';
                } else {
                    authError.textContent = '❌ Введите email и пароль';
                }
            });

            document.getElementById('authEmail').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    document.getElementById('authPassword').focus();
                }
            });

            document.getElementById('authPassword').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    document.getElementById('signInBtn').click();
                }
            });

            // === ИНИЦИАЛИЗАЦИЯ ===
            document.getElementById('app').style.display = 'none';
            checkAuth();

        })();
    </script>
</body>
</html>
